<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>My Tasks</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <h1>My Tasks ✅</h1>

    <p id="welcomeText"></p>

    <input
      type="text"
      id="taskInput"
      placeholder="Enter Task"
    >

    <button id="addTaskBtn">
      Add Task
    </button>

    <button id="logoutBtn">
      Logout
    </button>

    <ul id="taskList"></ul>

  </div>

  <script type="module" src="todo.js"></script>

</body>
</html>
